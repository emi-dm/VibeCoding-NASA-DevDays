# SonarQube / SonarCloud configuration

sonar.projectKey=emi-dm_VibeCoding-NASA-DevDays
sonar.projectName=VibeCoding-NASA-DevDays
sonar.sourceEncoding=UTF-8
sonar.organization=emi-dm

sonar.sources=app,components,lib
sonar.typescript.tsconfigPath=tsconfig.json

sonar.exclusions=**/*.d.ts,**/node_modules/**,**/.next/**,**/out/**,**/coverage/**,**/public/**,next-env.d.ts,**/*.config.mjs,**/*.config.ts

sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.host.url=https://sonarcloud.io

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Optional: fail CI when quality gate fails (set in scanner args or UI as preferred)
# sonar.qualitygate.wait=true